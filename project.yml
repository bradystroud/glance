name: Glance
options:
  bundleIdPrefix: dev.stroud
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  Glance:
    type: application
    platform: iOS
    sources:
      - Glance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.stroud.glance
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 2          # iPad only
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Glance shows photos from your library on the dashboard."
        INFOPLIST_KEY_NSAppleMusicUsageDescription: "Glance shows what's currently playing in Apple Music."
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
